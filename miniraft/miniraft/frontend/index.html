<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RaftBoard — Distributed Drawing</title>
  <style>
    /* ── Reset & Variables ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #161923;
      --border:    #252a36;
      --accent:    #6c63ff;
      --accent2:   #ff6584;
      --success:   #43e97b;
      --warn:      #f9ca24;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --radius:    10px;
      --font-head: 'Space Grotesk', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-head);
      overflow: hidden;
    }

    /* ── Layout ────────────────────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-rows: 52px 1fr 44px;
      height: 100vh;
    }

    /* ── Header ────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 16px;
      z-index: 10;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--accent); }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .color-swatch {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }
    .color-swatch:hover,
    .color-swatch.active { transform: scale(1.2); border-color: #fff; }

    .size-btn {
      background: var(--border);
      border: none;
      border-radius: 6px;
      color: var(--text);
      padding: 4px 10px;
      cursor: pointer;
      font-family: var(--font-head);
      font-size: 13px;
      transition: background 0.15s;
    }
    .size-btn:hover, .size-btn.active { background: var(--accent); }

    .sep { width: 1px; height: 24px; background: var(--border); }

    .clear-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      padding: 5px 12px;
      cursor: pointer;
      font-family: var(--font-head);
      font-size: 13px;
      transition: all 0.15s;
    }
    .clear-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    /* ── Cluster Panel ─────────────────────────────────────────────── */
    .cluster-panel {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .node-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 12px;
      font-family: var(--font-mono);
      transition: background 0.3s;
    }
    .node-badge.leader { background: rgba(108,99,255,0.25); }
    .node-badge.unreachable { opacity: 0.4; }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .dot.leader  { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .dot.follower { background: var(--success); }
    .dot.candidate { background: var(--warn); }
    .dot.unreachable { background: var(--accent2); }

    /* ── Canvas Area ───────────────────────────────────────────────── */
    .canvas-wrap {
      position: relative;
      overflow: hidden;
      cursor: crosshair;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* faint grid on canvas */
    .canvas-wrap::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      opacity: 0.4;
    }

    /* ── Status Bar ────────────────────────────────────────────────── */
    footer {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--muted);
    }

    .status-item { display: flex; align-items: center; gap: 5px; }

    #ws-status { 
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent2);
      transition: background 0.3s;
    }
    #ws-status.connected { background: var(--success); }

    /* ── Toast Notification ────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 60px; right: 20px;
      background: var(--surface);
      border: 1px solid var(--accent);
      color: var(--text);
      padding: 10px 18px;
      border-radius: var(--radius);
      font-size: 13px;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<div class="app">
  <!-- ── Header ── -->
  <header>
    <div class="logo">Raft<span>Board</span></div>

    <div class="toolbar">
      <!-- Colors -->
      <div class="color-swatch active" style="background:#e8eaf0" data-color="#e8eaf0" title="White"></div>
      <div class="color-swatch" style="background:#6c63ff" data-color="#6c63ff" title="Violet"></div>
      <div class="color-swatch" style="background:#43e97b" data-color="#43e97b" title="Green"></div>
      <div class="color-swatch" style="background:#ff6584" data-color="#ff6584" title="Pink"></div>
      <div class="color-swatch" style="background:#f9ca24" data-color="#f9ca24" title="Yellow"></div>
      <div class="color-swatch" style="background:#38bdf8" data-color="#38bdf8" title="Cyan"></div>

      <div class="sep"></div>

      <!-- Brush sizes -->
      <button class="size-btn active" data-size="3">S</button>
      <button class="size-btn" data-size="7">M</button>
      <button class="size-btn" data-size="16">L</button>

      <div class="sep"></div>
      <button class="clear-btn" id="clearBtn">Clear</button>
    </div>

    <!-- Cluster status -->
    <div class="cluster-panel" id="clusterPanel">
      <div class="node-badge" id="badge-replica1">
        <div class="dot" id="dot-replica1"></div>r1
      </div>
      <div class="node-badge" id="badge-replica2">
        <div class="dot" id="dot-replica2"></div>r2
      </div>
      <div class="node-badge" id="badge-replica3">
        <div class="dot" id="dot-replica3"></div>r3
      </div>
    </div>
  </header>

  <!-- ── Canvas ── -->
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="board"></canvas>
  </div>

  <!-- ── Footer ── -->
  <footer>
    <div class="status-item">
      <div id="ws-status"></div>
      <span id="ws-label">Connecting…</span>
    </div>
    <div class="status-item">Leader: <span id="leader-label" style="color:var(--accent)">—</span></div>
    <div class="status-item">Strokes: <span id="stroke-count">0</span></div>
    <div class="status-item">Clients: <span id="client-count">—</span></div>
  </footer>
</div>

<div id="toast"></div>

<script>
// ── Canvas Setup ──────────────────────────────────────────────────────────────
const wrap   = document.getElementById("canvasWrap");
const canvas = document.getElementById("board");
const ctx    = canvas.getContext("2d");

function resize() {
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
}
resize();
window.addEventListener("resize", resize);

// ── Drawing State ─────────────────────────────────────────────────────────────
let isDrawing = false;
let currentPath = [];
let strokeColor = "#e8eaf0";
let strokeSize  = 3;
let totalStrokes = 0;

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - r.left) / r.width,   // normalized 0–1
    y: (src.clientY - r.top)  / r.height,
  };
}

canvas.addEventListener("mousedown",  (e) => { isDrawing = true; currentPath = [getPos(e)]; });
canvas.addEventListener("mousemove",  (e) => {
  if (!isDrawing) return;
  currentPath.push(getPos(e));
  drawPath(currentPath, strokeColor, strokeSize);
});
canvas.addEventListener("mouseup",    endStroke);
canvas.addEventListener("mouseleave", endStroke);
canvas.addEventListener("touchstart", (e) => { e.preventDefault(); isDrawing = true; currentPath = [getPos(e)]; });
canvas.addEventListener("touchmove",  (e) => {
  e.preventDefault();
  if (!isDrawing) return;
  currentPath.push(getPos(e));
  drawPath(currentPath, strokeColor, strokeSize);
});
canvas.addEventListener("touchend", endStroke);

function endStroke() {
  if (!isDrawing || currentPath.length < 2) { isDrawing = false; return; }
  isDrawing = false;
  const stroke = { points: currentPath, color: strokeColor, size: strokeSize };
  sendStroke(stroke);
  currentPath = [];
}

/** Draw a normalized-coordinate path onto the canvas */
function drawPath(points, color, size) {
  if (points.length < 2) return;
  ctx.strokeStyle = color;
  ctx.lineWidth   = size;
  ctx.lineCap     = "round";
  ctx.lineJoin    = "round";
  ctx.beginPath();
  ctx.moveTo(points[0].x * canvas.width, points[0].y * canvas.height);
  for (let i = 1; i < points.length; i++) {
    ctx.lineTo(points[i].x * canvas.width, points[i].y * canvas.height);
  }
  ctx.stroke();
}

// ── Toolbar ───────────────────────────────────────────────────────────────────
document.querySelectorAll(".color-swatch").forEach((el) => {
  el.addEventListener("click", () => {
    document.querySelectorAll(".color-swatch").forEach(s => s.classList.remove("active"));
    el.classList.add("active");
    strokeColor = el.dataset.color;
  });
});

document.querySelectorAll(".size-btn").forEach((el) => {
  el.addEventListener("click", () => {
    document.querySelectorAll(".size-btn").forEach(b => b.classList.remove("active"));
    el.classList.add("active");
    strokeSize = parseInt(el.dataset.size);
  });
});

document.getElementById("clearBtn").addEventListener("click", () => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  totalStrokes = 0;
  document.getElementById("stroke-count").textContent = 0;
  showToast("Canvas cleared (local only)");
});

// ── WebSocket ─────────────────────────────────────────────────────────────────
const GATEWAY_WS = `ws://${location.hostname}:3000`;
let ws;
let reconnectTimer;

function connect() {
  ws = new WebSocket(GATEWAY_WS);

  ws.onopen = () => {
    document.getElementById("ws-status").classList.add("connected");
    document.getElementById("ws-label").textContent = "Connected";
    showToast("Connected to RaftBoard ✓");
    clearTimeout(reconnectTimer);
  };

  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);
    if (msg.type === "stroke") {
      drawPath(msg.stroke.points, msg.stroke.color, msg.stroke.size);
      totalStrokes++;
      document.getElementById("stroke-count").textContent = totalStrokes;
    }
  };

  ws.onclose = () => {
    document.getElementById("ws-status").classList.remove("connected");
    document.getElementById("ws-label").textContent = "Reconnecting…";
    reconnectTimer = setTimeout(connect, 1500);
  };

  ws.onerror = () => ws.close();
}

function sendStroke(stroke) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: "stroke", stroke }));
  }
}

connect();

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2500);
}

// ── Cluster Status Polling ────────────────────────────────────────────────────
async function pollCluster() {
  try {
    const res = await fetch(`http://${location.hostname}:3000/cluster`);
    const nodes = await res.json();

    nodes.forEach((node) => {
      // node.url e.g. "http://replica1:4001"
      const id = node.url.split("//")[1].split(":")[0]; // "replica1"
      const dot   = document.getElementById(`dot-${id}`);
      const badge = document.getElementById(`badge-${id}`);
      if (!dot) return;

      const s = (node.state || "unreachable").toLowerCase();
      dot.className   = `dot ${s}`;
      badge.className = `node-badge ${s === "leader" ? "leader" : s === "unreachable" ? "unreachable" : ""}`;

      if (s === "leader") {
        document.getElementById("leader-label").textContent = id;
      }
    });

    // Gateway status
    const gw = await fetch(`http://${location.hostname}:3000/status`);
    const gwData = await gw.json();
    document.getElementById("client-count").textContent = gwData.connectedClients ?? "—";
  } catch {
    /* gateway not ready yet */
  }
}

setInterval(pollCluster, 1500);
pollCluster();
</script>
</body>
</html>
